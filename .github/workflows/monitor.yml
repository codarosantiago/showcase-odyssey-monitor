name: Monitor La Odisea

on:
  schedule:
    # Every 20 minutes, offset from the top of the hour to reduce queue delays.
    - cron: "7,27,47 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: showcase-odyssey-monitor
  cancel-in-progress: false

jobs:
  check-showtimes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Check Showcase
        id: monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python monitor.py

      - name: Disable schedule after successful alert
        if: steps.monitor.outputs.alerted == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow disable monitor.yml
